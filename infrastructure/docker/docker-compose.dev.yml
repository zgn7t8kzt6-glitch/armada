# Local development services only. Never production. Synthetic data only —
# no production PHI may be loaded into these containers (SECURITY.md).
name: armada-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: armada
      POSTGRES_PASSWORD: armada_dev_only
      POSTGRES_DB: armada_dev
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U armada -d armada_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
  redis-data:
