<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Welcome — Armada Recovery</title>
<style>
  /* Brand palette (from the Armada Recovery logo) */
  :root{
    --teal:#235056; --teal-2:#2d6168; --aqua:#5fb0c2; --sage:#a7ba86;
    --gold:#d29a5e; --gold-2:#e5a05e; --cream:#f5f3ed; --paper:#ffffff;
    --ink:#1b2825; --muted:#6f7a75;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:'Cormorant Garamond',Georgia,'Times New Roman',serif;
    color:var(--teal);
    background:
      radial-gradient(1200px 700px at 50% -8%, rgba(210,154,94,.16), transparent 60%),
      radial-gradient(1000px 800px at 90% 110%, rgba(95,176,194,.18), transparent 55%),
      linear-gradient(160deg,#fbf9f3 0%, var(--cream) 55%, #efeadf 100%);
    display:flex; flex-direction:column; min-height:100vh; overflow:hidden;
  }
  /* Header is now compact — the names are the star of the screen. */
  header{ text-align:center; padding:4vh 4vw 0; }
  .logo{ height:13vh; max-height:150px; width:auto; margin-bottom:1.4vh;
    filter:drop-shadow(0 6px 22px rgba(35,80,86,.18)); }
  h1{ margin:0; font-size:3vw; font-weight:600; line-height:1.05; color:var(--teal) }
  .sub{ margin:1vh 0 0; font-size:1.5vw; color:var(--teal-2); opacity:.9 }
  .rule{ width:30vw; max-width:520px; height:3px; margin:1.8vh auto 0; border-radius:3px;
    background:linear-gradient(90deg, transparent, var(--gold), var(--aqua), transparent) }

  /* The hero: today's arrivals, large and unmistakable. */
  main{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:1vh 4vw 4vh; }
  .eyebrow{ letter-spacing:.5em; text-transform:uppercase; font-size:1.4vw;
    color:var(--gold); font-family:'Inter',system-ui,sans-serif; font-weight:600; margin:0 0 3vh }
  .names{ display:flex; flex-wrap:wrap; gap:2.4vh 3vw; justify-content:center; align-items:center; max-width:94vw }
  .name{
    position:relative;
    font-size:clamp(2.2rem, 5.6vw, 6rem); font-weight:600; line-height:1.05; color:var(--teal);
    padding:2.2vh 4vw; border-radius:2.2vh;
    background:var(--paper); border:2px solid rgba(95,176,194,.45);
    box-shadow:0 14px 40px rgba(35,80,86,.13);
    display:flex; align-items:center; gap:1.6vw;
  }
  .name .dot{ width:1.5vw; height:1.5vw; min-width:14px; min-height:14px; border-radius:50%;
    background:linear-gradient(160deg,var(--gold),var(--aqua)) }
  .name.arrived{ border-color:var(--sage); background:linear-gradient(180deg,#fff,#f3f8ec) }
  .name.arrived .dot{ background:var(--sage) }
  .name.arrived .check{ color:var(--sage); font-size:.7em; margin-left:.5vw }
  .empty{ font-size:2.6vw; color:var(--muted) }
  footer{ text-align:center; padding:0 0 3vh; font-family:'Inter',system-ui,sans-serif;
    font-size:1vw; letter-spacing:.28em; text-transform:uppercase; color:var(--muted); opacity:.8 }
</style>
</head>
<body>
  <header>
    <img class="logo" src="/logo.png" alt="Armada Recovery"/>
    <h1 id="welcomeLine">Welcome to Armada Recovery</h1>
    <p class="sub">You belong here. Your care begins the moment you walk in.</p>
    <div class="rule"></div>
  </header>
  <main>
    <p class="eyebrow" id="eyebrow">Arriving today</p>
    <div class="names" id="names"><div class="empty">Preparing today's welcome…</div></div>
  </main>
  <footer>Armada Care Standards</footer>
<script>
async function refresh(){
  try{
    const r = await fetch('/api/arrivals/board', { credentials:'same-origin' });
    if(r.status===401){ document.getElementById('names').innerHTML='<div class="empty">Please sign in on this device first (open the app and log in), then reload this page.</div>'; return; }
    const d = await r.json();
    if(d.facility) document.getElementById('welcomeLine').textContent = 'Welcome to ' + d.facility;
    const box = document.getElementById('names');
    const eyebrow = document.getElementById('eyebrow');
    if(!d.names || !d.names.length){ eyebrow.style.display='none'; box.innerHTML='<div class="empty">No scheduled arrivals today.</div>'; return; }
    eyebrow.style.display='block';
    box.innerHTML = d.names.map(n=>`<div class="name${n.arrived?' arrived':''}"><span class="dot"></span>${(n.name||'').replace(/[<>&]/g,'')}${n.arrived?'<span class="check">✓</span>':''}</div>`).join('');
  }catch(e){ /* keep the last good board on transient errors */ }
}
refresh(); setInterval(refresh, 30000);
</script>
</body>
</html>
