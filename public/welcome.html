<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Welcome — Armada Recovery</title>
<style>
  /* Brand palette (from the Armada Recovery logo) */
  :root{
    --teal:#235056; --teal-2:#2d6168; --aqua:#5fb0c2; --sage:#a7ba86;
    --gold:#d29a5e; --gold-2:#e5a05e; --cream:#f5f3ed; --paper:#ffffff;
    --ink:#1b2825; --muted:#6f7a75;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:'Cormorant Garamond',Georgia,'Times New Roman',serif;
    color:var(--teal);
    background:
      radial-gradient(1200px 700px at 50% -8%, rgba(210,154,94,.16), transparent 60%),
      radial-gradient(1000px 800px at 90% 110%, rgba(95,176,194,.18), transparent 55%),
      linear-gradient(160deg,#fbf9f3 0%, var(--cream) 55%, #efeadf 100%);
    display:flex; flex-direction:column; min-height:100vh; overflow:hidden;
  }
  header{ text-align:center; padding:5vh 4vw 1vh; }
  .logo{ height:18vh; max-height:200px; width:auto; margin-bottom:2vh;
    filter:drop-shadow(0 6px 22px rgba(35,80,86,.18)); }
  .eyebrow{ letter-spacing:.55em; text-transform:uppercase; font-size:1.3vw;
    color:var(--gold); font-family:'Inter',system-ui,sans-serif; margin:0 0 1vh; font-weight:600 }
  h1{ margin:0; font-size:4.6vw; font-weight:600; line-height:1.05; color:var(--teal) }
  .sub{ margin:1.4vh 0 0; font-size:1.7vw; color:var(--teal-2); opacity:.9 }
  /* gold gradient divider echoing the logo's sunrise */
  .rule{ width:34vw; max-width:560px; height:3px; margin:2.4vh auto 0; border-radius:3px;
    background:linear-gradient(90deg, transparent, var(--gold), var(--aqua), transparent) }
  main{ flex:1; display:flex; align-items:center; justify-content:center; padding:0 5vw 5vh; }
  .names{ display:flex; flex-wrap:wrap; gap:2.2vh 2.2vw; justify-content:center; max-width:92vw }
  .chip{
    font-size:3vw; padding:1.5vh 3vw; border-radius:999px; color:var(--teal);
    background:var(--paper); border:1.5px solid rgba(95,176,194,.55);
    box-shadow:0 8px 26px rgba(35,80,86,.10);
    display:flex; align-items:center; gap:1.3vw;
  }
  .chip.arrived{ border-color:var(--sage); background:linear-gradient(180deg,#fff,#f4f8ef) }
  .dot{ width:1.3vw; height:1.3vw; border-radius:50%;
    background:linear-gradient(160deg,var(--gold),var(--aqua)) }
  .chip.arrived .dot{ background:var(--sage) }
  .chip.arrived::after{ content:'✓'; color:var(--teal); font-size:2.4vw; margin-left:.4vw }
  .empty{ font-size:2.4vw; color:var(--muted) }
  footer{ text-align:center; padding:0 0 3.5vh; font-family:'Inter',system-ui,sans-serif;
    font-size:1vw; letter-spacing:.28em; text-transform:uppercase; color:var(--muted); opacity:.8 }
</style>
</head>
<body>
  <header>
    <img class="logo" src="/logo.png" alt="Armada Recovery"/>
    <p class="eyebrow">Today we welcome</p>
    <h1 id="welcomeLine">Welcome to Armada Recovery</h1>
    <p class="sub">You belong here. Your care begins the moment you walk in.</p>
    <div class="rule"></div>
  </header>
  <main><div class="names" id="names"><div class="empty">Preparing today's welcome…</div></div></main>
  <footer>Armada Care Standards</footer>
<script>
async function refresh(){
  try{
    const r = await fetch('/api/arrivals/board', { credentials:'same-origin' });
    if(r.status===401){ document.getElementById('names').innerHTML='<div class="empty">Please sign in on this device first (open the app and log in), then reload this page.</div>'; return; }
    const d = await r.json();
    if(d.facility) document.getElementById('welcomeLine').textContent = 'Welcome to ' + d.facility;
    const box = document.getElementById('names');
    if(!d.names || !d.names.length){ box.innerHTML='<div class="empty">No scheduled arrivals today.</div>'; return; }
    box.innerHTML = d.names.map(n=>`<div class="chip${n.arrived?' arrived':''}"><span class="dot"></span>${(n.name||'').replace(/[<>&]/g,'')}</div>`).join('');
  }catch(e){ /* keep the last good board on transient errors */ }
}
refresh(); setInterval(refresh, 30000);
</script>
</body>
</html>
