# Render Blueprint for Armada Care Standards.
# In Render: New + → Blueprint → connect this repo → Apply.
# Then set ADMIN_PASS (and optionally ADMIN_USER) when prompted — they're marked
# sync:false so Render asks you for them instead of storing them in git.
services:
  - type: web
    name: armada-care
    runtime: node
    plan: standard           # Standard (~$25/mo): more RAM/CPU + no spin-down/cold
                             # starts — needed for the Kipu sync + AI workload to
                             # feel snappy in production. (starter works but is
                             # underpowered for the per-client detail/notes pulls.)
    region: oregon
    branch: claude/sober-living-software-my0gfm
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      - key: ARMADA_DB
        value: /var/data/armada.db   # store the SQLite file on the persistent disk
      - key: SEED_SAMPLE
        value: "false"               # NEVER seed demo staff/clients in production (known passwords)
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASS
        sync: false                  # Render will prompt you to enter this secret
      # ── AI provider ──────────────────────────────────────────────────────
      # Default is the Anthropic API (needs an Anthropic BAA before real PHI).
      # To run Claude through AWS Bedrock instead — so the free AWS BAA covers
      # the model and no separate Anthropic BAA is needed — set:
      #   AI_PROVIDER=bedrock, AWS_REGION, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,
      #   BEDROCK_MODEL_ID (the exact id available in your region's Bedrock console).
      # Then set AI_DEIDENTIFY=false to let real client info reach Claude legally.
      - key: AI_PROVIDER
        sync: false                  # "anthropic" (default) or "bedrock"
      - key: ANTHROPIC_API_KEY
        sync: false                  # Anthropic path: key from console.anthropic.com
      - key: AWS_REGION
        sync: false                  # Bedrock path, e.g. us-east-1
      - key: AWS_ACCESS_KEY_ID
        sync: false                  # Bedrock path
      - key: AWS_SECRET_ACCESS_KEY
        sync: false                  # Bedrock path
      - key: BEDROCK_MODEL_ID
        sync: false                  # Bedrock path, e.g. us.anthropic.claude-...-v1:0
      - key: AI_DEIDENTIFY
        sync: false                  # "false" only with a signed BAA (Bedrock=AWS, or Anthropic)
      # ── Email: send from YOUR mailbox over SMTP (preferred), or via Resend ──
      - key: SMTP_HOST
        sync: false                  # e.g. smtp.office365.com (Microsoft 365) or smtp.gmail.com (Google)
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false                  # your full email address (the From / login)
      - key: SMTP_PASS
        sync: false                  # an APP PASSWORD for that mailbox (never your real password)
      - key: SMTP_FROM
        sync: false                  # optional display From, e.g. "Armada Census <shlomo@armadarecovery.com>"
      - key: CENSUS_EMAIL_TO
        sync: false                  # who gets the nightly census (comma-separated)
      - key: RESEND_API_KEY
        sync: false                  # alternative to SMTP: a Resend.com API key
      - key: REPORT_TO
        sync: false                  # optional: who gets the weekly report (comma-separated emails)
      - key: TWILIO_SID
        sync: false                  # optional: SMS alerts to the on-call leader
      - key: TWILIO_TOKEN
        sync: false
      - key: TWILIO_FROM
        sync: false                  # your Twilio phone number, e.g. +1...
      # ── Salesforce (referral reciprocity sync) — optional ────────────────
      # Connected App, OAuth client-credentials flow. Lets the Partners page
      # show inbound referrals (who sends us business) alongside outbound.
      - key: SF_INSTANCE_URL
        sync: false                  # e.g. https://yourorg.my.salesforce.com
      - key: SF_CLIENT_ID
        sync: false                  # Connected App consumer key
      - key: SF_CLIENT_SECRET
        sync: false                  # Connected App consumer secret
      - key: SF_INBOUND_SOQL
        sync: false                  # optional: override to match your SF objects/fields
      # ── Kipu EMR (roster + note red-flags) — optional ────────────────────
      - key: KIPU_ACCESS_ID
        sync: false
      - key: KIPU_SECRET_KEY
        sync: false
      - key: KIPU_APP_ID
        sync: false
      # ── Kipu data warehouse (Azure SQL — Chaim's existing dashboard DB) ───
      # Read-only sync of census/LOS/discharges/notes. Use a SELECT-only login.
      - key: WH_SERVER
        sync: false                  # e.g. armada-sql.database.windows.net
      - key: WH_DATABASE
        sync: false                  # e.g. Armada
      - key: WH_USER
        sync: false                  # dedicated read-only login (e.g. armada_app)
      - key: WH_PASSWORD
        sync: false
      - key: WH_CENSUS_SQL
        sync: false                  # roster query, e.g. SELECT * FROM kipu.census
      - key: WH_NOTES_SQL
        sync: false                  # optional: recent clinical notes for red-flag scan
    disk:
      name: armada-data
      mountPath: /var/data
      sizeGB: 1
