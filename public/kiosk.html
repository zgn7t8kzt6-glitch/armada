<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Armada — How can we care for you?</title>
<link rel="stylesheet" href="/styles.css" />
<style>
  body{background:linear-gradient(135deg,var(--navy),var(--navy-2));min-height:100vh}
  .kiosk{max-width:680px;margin:0 auto;padding:28px 18px}
  .kcard{background:#fff;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.25);padding:26px;border-top:4px solid var(--gold)}
  .kiosk h1{color:var(--navy);margin:6px 0}
  .kbtn{display:block;width:100%;text-align:left;font-family:inherit;font-size:18px;padding:18px 20px;margin:10px 0;border:1px solid var(--line);border-radius:12px;background:#fff;cursor:pointer;color:var(--navy)}
  .kbtn:hover{border-color:var(--gold);background:#faf6ee}
  .kmark{width:auto;height:84px;max-width:240px;object-fit:contain;display:block;margin:0 auto 14px}
  .ksub{color:var(--muted);font-family:sans-serif;font-size:15px}
  textarea,select,input{font-size:17px;padding:12px}
  .big{font-size:18px;padding:16px 22px}
  .mopt{flex:1;font-size:20px;text-align:center}
  .msel{border-color:var(--gold)!important;background:#faf6ee!important;font-weight:600}
  .kchip{font-family:inherit;font-size:15px;padding:8px 14px;border:1px solid var(--line);border-radius:999px;background:#fff;cursor:pointer;color:var(--navy);margin:0 4px 4px 0}
</style>
</head>
<body>
<div class="kiosk">
  <div class="kcard">
    <img src="/logo.png" class="kmark" alt="Armada Recovery"/>
    <div id="kview"></div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let CODE=localStorage.getItem('kioskCode')||'', DATA=null, CLIENT='', VIEW='';
const MEALS3=['Breakfast','Lunch','Dinner'];
let MEAL_SEL='', MEAL_DATE='';
// Which meal is it right now, by the iPad's local clock (the real dining-room time).
function currentMeal(){ const h=new Date().getHours(); return h<11?'Breakfast':(h<16?'Lunch':'Dinner'); }
function localDate(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

async function kapi(path, opts){ const r=await fetch('/api/kiosk/'+path,opts); if(!r.ok){throw new Error((await r.json().catch(()=>({}))).error||'Error');} return r.json(); }

function gate(){
  $('kview').innerHTML=`<h1>Welcome</h1><p class="ksub">A staff member will enter the kiosk code to begin.</p>
    <label>Kiosk code</label><input id="kcode" type="password"/><div id="kerr" class="err"></div>
    <button class="btn btn-gold big" style="margin-top:12px;width:100%" onclick="enter()">Start</button>`;
}
async function enter(){
  CODE=$('kcode')?$('kcode').value:CODE;
  try{ DATA=await kapi('data?code='+encodeURIComponent(CODE)); LAST_SYNC=Date.now(); localStorage.setItem('kioskCode',CODE); home(); }
  catch(e){ if($('kerr'))$('kerr').textContent='That code didn\'t work.'; else gate(); }
}
// Re-pull the resident list without re-entering the code (kiosk stays open for days
// under Guided Access, so new admits won't show until this runs). Anyone can tap it.
let LAST_SYNC=0;
async function refreshData(){
  const btn=$('kRefreshBtn'); if(btn){ btn.disabled=true; btn.textContent='Updating…'; }
  try{
    DATA=await kapi('data?code='+encodeURIComponent(CODE));
    LAST_SYNC=Date.now();
    home();   // re-render with the fresh list
    const st=$('kSyncNote'); if(st){ st.textContent='✓ Updated — '+syncLine(); st.style.color='var(--gold)'; }
  }catch(e){
    if(btn){ btn.disabled=false; btn.textContent='🔄  Update list'; }
    const st=$('kSyncNote'); if(st){ st.textContent='Could not update — ask a staff member to re-enter the kiosk code.'; }
  }
}
function syncLine(){
  const n=(DATA&&DATA.clients)?DATA.clients.length:0;
  const t=LAST_SYNC?new Date(LAST_SYNC).toLocaleTimeString([], {hour:'numeric', minute:'2-digit'}):'—';
  return 'Showing '+n+' resident'+(n===1?'':'s')+' · Updated '+t;
}
function home(){
  VIEW='home';
  $('kview').innerHTML=`<h1>How can we care for you?</h1>
    <p class="ksub">Ask for something, or tell us how you're doing. Surveys can be anonymous; a request will ask your name so we can bring it to you.</p>
    <label>I am (optional)</label>
    <select id="kclient"><option value="">Prefer not to say</option>${DATA.clients.map(c=>`<option value="${c.id}">${esc(c.pref||c.name)}${c.room?' · '+esc(c.room):''}</option>`).join('')}</select>
    <button class="kbtn" onclick="careView()">🧭  Who's on my care team?</button>
    <button class="kbtn" onclick="reqView()">🛎  Request something</button>
    <button class="kbtn" onclick="mealView()">🍽️  How was ${currentMeal().toLowerCase()}?</button>
    ${DATA.surveys.map(s=>`<button class="kbtn" onclick="surveyView(${s.id})">📝  ${esc(s.title)}</button>`).join('')}
    <button class="kbtn" onclick="suggestionView()">💡  Share an idea</button>
    <div style="margin-top:18px;text-align:center">
      <button id="kRefreshBtn" class="btn btn-ghost" style="font-size:15px" onclick="refreshData()">🔄  Update list</button>
      <div id="kSyncNote" class="ksub" style="margin-top:8px">${syncLine()}</div>
      <p class="ksub" style="margin-top:4px;font-size:13px">Don't see your name? Tap Update.</p>
    </div>`;
}
function client(){ const s=$('kclient'); return s?s.value:''; }
// Suggestion box — one free-text idea, optional name, straight to leadership.
function suggestionView(){
  VIEW='suggest';
  CLIENT=client();
  $('kview').innerHTML=`<h1>Share an idea 💡</h1>
    <p class="ksub">Anything that would make your stay better — big or small. Sharing your name is optional.</p>
    <label>Your name (optional)</label>
    <select id="sgclient"><option value="">Prefer not to say</option>${DATA.clients.map(c=>`<option value="${c.id}"${String(c.id)===String(CLIENT)?' selected':''}>${esc(c.pref||c.name)}${c.room?' · '+esc(c.room):''}</option>`).join('')}</select>
    <label style="margin-top:10px;display:block">Your idea</label>
    <textarea id="sgtext" rows="4" placeholder="I'd love it if…"></textarea>
    <div id="sgerr" class="err" style="margin-top:6px"></div>
    <button class="btn btn-gold big" style="width:100%;margin-top:12px" onclick="submitSuggestion()">Send</button>
    <button class="kbtn" style="text-align:center;margin-top:10px" onclick="home()">← Back</button>`;
}
async function submitSuggestion(){
  const text=$('sgtext')?$('sgtext').value.trim():'';
  if(!text){ if($('sgerr'))$('sgerr').textContent='Tell us your idea first.'; return; }
  const cid=$('sgclient')?$('sgclient').value:'';
  try{
    await kapi('suggestion',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:CODE,client_id:cid||null,text})});
    thanks('Thank you — your idea goes straight to our leadership team.');
  }catch(e){ if($('sgerr'))$('sgerr').textContent=e.message; }
}
// Daily meal pulse — three taps, in the resident's hands. Short on purpose.
function mealView(){
  VIEW='meal';
  CLIENT=client();
  MEAL_SEL=currentMeal(); MEAL_DATE=localDate();
  const ynRow=(k,q,yes,no)=>`<div class="mq" data-k="${k}" style="margin:16px 0">
    <div style="font-size:18px;color:var(--navy);margin-bottom:8px">${q}</div>
    <div class="toolbar" style="gap:10px">
      <button class="kbtn mopt" style="margin:0" onclick="pick(this,1)">${yes}</button>
      <button class="kbtn mopt" style="margin:0" onclick="pick(this,0)">${no}</button>
    </div></div>`;
  $('kview').innerHTML=`<h1>How was the meal?</h1>
    <p class="ksub">Just a few taps — it helps us cook for you, not just feed you.</p>
    <div style="margin:6px 0 8px">${MEALS3.map(m=>`<button class="kchip${m===MEAL_SEL?' msel':''}" onclick="setMeal('${m}')">${m}</button>`).join('')}</div>
    <div id="mdish" style="font-size:18px;color:var(--navy);font-weight:600;margin:0 0 12px">${dishLine(MEAL_SEL)}</div>
    ${ynRow('liked','Did you enjoy it?','😋  Yes','😕  Not really')}
    ${ynRow('enough','Was there enough?','👍  Plenty','🙁  Still hungry')}
    ${ynRow('again','Would you want it again?','💛  Yes please','🙅  Maybe not')}
    <label style="margin-top:10px;display:block">Anything you'd want us to know? (optional)</label>
    <input id="mcomment" placeholder="e.g. loved the chicken; soup was cold" maxlength="200"/>
    <div id="merr" class="err" style="margin-top:6px"></div>
    <button class="btn btn-gold big" style="width:100%;margin-top:14px" onclick="submitMeal()">Send</button>
    <button class="kbtn" style="text-align:center;margin-top:10px" onclick="home()">← Back</button>`;
}
function dishLine(meal){
  const d=(DATA&&DATA.menu&&DATA.menu[meal])?DATA.menu[meal].dish:'';
  return d ? '🍽️ '+meal+': '+esc(d) : '';
}
function setMeal(m){ MEAL_SEL=m; document.querySelectorAll('.kchip').forEach(b=>b.classList.toggle('msel', b.textContent===m)); const el=$('mdish'); if(el) el.innerHTML=dishLine(m); }
function pick(btn,val){ const row=btn.closest('.mq'); row.dataset.val=val; row.querySelectorAll('.mopt').forEach(b=>b.classList.remove('msel')); btn.classList.add('msel'); }
async function submitMeal(){
  const get=k=>{const r=document.querySelector('.mq[data-k="'+k+'"]'); return r&&r.dataset.val!=null?+r.dataset.val:null;};
  const liked=get('liked'), enough=get('enough'), again=get('again');
  const comment=$('mcomment')?$('mcomment').value.trim():'';
  if(liked==null&&enough==null&&again==null&&!comment){ if($('merr'))$('merr').textContent='Tap at least one answer.'; return; }
  try{
    await kapi('meal',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({code:CODE,meal:MEAL_SEL,meal_date:MEAL_DATE,client_id:CLIENT||null,liked,enough,again,comment})});
    thanks('Thank you — that helps us make every meal better.');
  }catch(e){ if($('merr'))$('merr').textContent=e.message; }
}
// "Who's on my care team?" — pick your name, see your own CM + therapist plus
// who's on shift right now. Names matter most when you're new and disoriented.
function careView(){
  VIEW='care';
  CLIENT=client();
  $('kview').innerHTML=`<h1>Who's on my care team? 🧭</h1>
    <p class="ksub">Choose your name and we'll show your case manager and therapist, plus who's on shift right now.</p>
    <label>Your name <span style="color:#c0392b">*</span></label>
    <select id="kcareclient" onchange="loadCareTeam()"><option value="">— choose your name —</option>${DATA.clients.map(c=>`<option value="${c.id}"${String(c.id)===String(CLIENT)?' selected':''}>${esc(c.pref||c.name)}${c.room?' · '+esc(c.room):''}</option>`).join('')}</select>
    <div id="kcareerr" class="err" style="margin-top:6px"></div>
    <div id="kcareout" style="margin-top:14px"></div>
    <button class="kbtn" style="text-align:center;margin-top:14px" onclick="home()">← Back</button>`;
  if(CLIENT) loadCareTeam();
}
function careList(label, arr, empty){
  const names=(arr||[]).filter(Boolean);
  return `<div style="margin:10px 0"><div style="font-family:sans-serif;font-size:13px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted)">${esc(label)}</div>
    <div style="font-size:19px;color:var(--navy);margin-top:2px">${names.length?names.map(esc).join(', '):'<span style="color:var(--muted);font-style:italic">'+esc(empty)+'</span>'}</div></div>`;
}
async function loadCareTeam(){
  const sel=$('kcareclient'); const cid=sel?sel.value:'';
  if($('kcareerr')) $('kcareerr').textContent='';
  if(!cid){ if($('kcareout')) $('kcareout').innerHTML=''; return; }
  CLIENT=cid;
  if($('kcareout')) $('kcareout').innerHTML='<p class="ksub">Looking that up…</p>';
  try{
    const d=await kapi('careteam?code='+encodeURIComponent(CODE)+'&client_id='+encodeURIComponent(cid));
    const onShift=d.onShift||{};
    $('kcareout').innerHTML=`
      <div class="kcard" style="box-shadow:none;border:1px solid var(--line);padding:18px;margin:0">
        <div style="font-size:13px;letter-spacing:.5px;text-transform:uppercase;color:var(--gold);font-family:sans-serif">Your team</div>
        ${careList('Your case manager', d.caseManager?[d.caseManager]:[], 'Not assigned yet — ask the front desk')}
        ${careList('Your therapist', d.therapist?[d.therapist]:[], 'Not assigned yet — ask the front desk')}
      </div>
      <div class="kcard" style="box-shadow:none;border:1px solid var(--line);padding:18px;margin:12px 0 0">
        <div style="font-size:13px;letter-spacing:.5px;text-transform:uppercase;color:var(--gold);font-family:sans-serif">On shift right now${d.shift?' · '+esc(d.shift):''}</div>
        ${careList('Nurse', onShift.nurses, 'No nurse shown — ask the front desk')}
        ${careList('RT / BHT', onShift.rts, 'No RT shown — ask the front desk')}
        ${careList('Case manager on shift', onShift.caseManagers, 'None on shift right now')}
      </div>`;
  }catch(e){ if($('kcareerr')) $('kcareerr').textContent=e.message; if($('kcareout')) $('kcareout').innerHTML=''; }
}
function reqView(){
  VIEW='req';
  CLIENT=client();
  const quick=['An extra blanket','A snack','To call my family','To talk to someone','Something for comfort','I want to leave'];
  $('kview').innerHTML=`<h1>What do you need?</h1>
    <p class="ksub">First, choose your name so we know who to help. Then tap a common one or write your own.</p>
    <label>Your name <span style="color:#c0392b">*</span></label>
    <select id="kreqclient"><option value="">— choose your name —</option>${DATA.clients.map(c=>`<option value="${c.id}"${String(c.id)===String(CLIENT)?' selected':''}>${esc(c.pref||c.name)}${c.room?' · '+esc(c.room):''}</option>`).join('')}</select>
    <div id="kquick" style="margin-top:10px">${quick.map(q=>`<button class="kbtn" onclick="quickReq(this)">${esc(q)}</button>`).join('')}</div>
    <label style="margin-top:10px;display:block">Or tell us in your words</label><select id="kdept"><option value="">Anything</option>${DATA.departments.map(d=>`<option>${esc(d)}</option>`).join('')}</select>
    <textarea id="krtext" placeholder="e.g. an extra blanket, to call my family, a snack…"></textarea>
    <div id="kreqerr" class="err"></div>
    <button class="btn btn-gold big" style="width:100%;margin-top:10px" onclick="sendReq()">Send</button>
    <button class="kbtn" onclick="home()">← Back</button>`;
}
function quickReq(b){ const t=$('krtext'); if(t){ t.value=b.textContent; } sendReq(); }
async function sendReq(){
  const cid = $('kreqclient') ? $('kreqclient').value : '';
  if(!cid){ if($('kreqerr')) $('kreqerr').textContent='Please choose your name so we can bring it to the right person.'; const s=$('kreqclient'); if(s){ s.focus(); s.style.borderColor='#c0392b'; } return; }
  if(!$('krtext').value.trim()) { if($('kreqerr')) $('kreqerr').textContent='Tell us what you need.'; return; }
  await kapi('request',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:CODE,client_id:cid,department:$('kdept').value||null,text:$('krtext').value})});
  thanks('We\'re on it. Someone will take care of this for you.');
}
function surveyView(id){
  VIEW='survey';
  CLIENT=client();
  const s=DATA.surveys.find(x=>x.id===id);
  let cat='',html='';
  s.questions.forEach(q=>{
    if(q.category&&q.category!==cat){cat=q.category;html+=`<div class="sv-cat">${esc(cat)}</div>`;}
    let inp;
    if(q.type==='text') inp=`<textarea class="sq-text"></textarea>`;
    else if(q.type==='yesno') inp=`<div class="sv-opts"><button type="button" class="sv-opt" data-v="1" onclick="kpick(this)">Yes</button><button type="button" class="sv-opt" data-v="0" onclick="kpick(this)">No</button></div>`;
    else inp=`<div class="sv-opts">${[1,2,3,4,5].map(i=>`<button type="button" class="sv-opt" data-v="${i}" onclick="kpick(this)">${i}</button>`).join('')}</div>`;
    html+=`<div class="sq" data-qid="${q.id}" data-type="${q.type}"><div class="sq-q">${esc(q.text)}</div>${inp}</div>`;
  });
  $('kview').innerHTML=`<h1>${esc(s.title)}</h1><p class="ksub">${esc(s.description||'')}</p>${html}
    <button class="btn btn-gold big" style="width:100%;margin-top:12px" onclick="sendSurvey(${id})">Submit</button>
    <button class="kbtn" onclick="home()">← Back</button>`;
}
function kpick(b){ b.parentNode.querySelectorAll('.sv-opt').forEach(x=>x.classList.remove('on')); b.classList.add('on'); b.parentNode.dataset.val=b.dataset.v; }
async function sendSurvey(id){
  const answers=[];
  document.querySelectorAll('.sq').forEach(sq=>{ const qid=+sq.dataset.qid;
    if(sq.dataset.type==='text'){const t=sq.querySelector('.sq-text').value.trim(); if(t)answers.push({question_id:qid,text:t});}
    else{const o=sq.querySelector('.sv-opts'); if(o&&o.dataset.val!=null)answers.push({question_id:qid,num:+o.dataset.val});}
  });
  if(!answers.length){home();return;}
  await kapi('survey',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:CODE,survey_id:id,client_id:CLIENT||null,answers})});
  thanks('Thank you for sharing. It helps us care for you better.');
}
function thanks(msg){
  $('kview').innerHTML=`<h1>Thank you 💚</h1><p class="ksub" style="font-size:17px">${esc(msg)}</p>
    <button class="btn btn-gold big" style="width:100%;margin-top:16px" onclick="home()">Done</button>`;
  setTimeout(()=>{ if($('kview')) home(); }, 6000);
}
if(CODE) enter(); else gate();

// Self-heal: while sitting idle on the home screen, quietly re-pull the resident
// list every 4 min. Only re-renders if the roster actually changed, so it never
// interrupts anyone mid-survey or resets a selection without reason.
setInterval(async ()=>{
  if(VIEW!=='home' || !CODE) return;
  try{
    const fresh=await kapi('data?code='+encodeURIComponent(CODE));
    const changed=!DATA || (fresh.clients||[]).length!==(DATA.clients||[]).length;
    DATA=fresh; LAST_SYNC=Date.now();
    if(changed && VIEW==='home') home();
    else { const st=$('kSyncNote'); if(st) st.textContent=syncLine(); }
  }catch(e){ /* leave the last good list in place */ }
}, 240000);
</script>
</body>
</html>
