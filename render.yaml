# Render Blueprint — Armada Excellence OS (staging demo, its own service).
#
# Creates a NEW service ("armada-excellence") on its own URL, leaving the
# original armada-care service and its data completely alone. This runs the
# new platform (apps/api + apps/web) with synthetic data only; true
# production mode is refused by scripts/start.mjs until the blueprint §35
# readiness gate is signed.
#
# To go live: Render dashboard → New + → Blueprint → connect this repo →
# Apply. Render creates the service from this file and gives it a URL like
# https://armada-excellence.onrender.com
services:
  - type: web
    name: armada-excellence
    runtime: node
    plan: starter            # plenty for a synthetic-data demo; upgrade with real use
    region: oregon
    branch: main
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: staging
      - key: SESSION_SECRET
        generateValue: true
      - key: LOG_LEVEL
        value: info
